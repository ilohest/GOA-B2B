<VirtualHost *:80>
    ServerName 82.112.255.95

    DocumentRoot /var/www/html/isaure/goa-kombucha/web
    <Directory /var/www/html/isaure/goa-kombucha/web>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
        RewriteRule ^ https://82.112.255.95%{REQUEST_URI} [R=301,L,NE]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/goa-kombucha-error.log
    CustomLog ${APACHE_LOG_DIR}/goa-kombucha-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName 82.112.255.95

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/82.112.255.95/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/82.112.255.95/privkey.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

    Header always set Strict-Transport-Security "max-age=31536000"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    DocumentRoot /var/www/html/isaure/goa-kombucha/web
    <Directory /var/www/html/isaure/goa-kombucha/web>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8788/api
    ProxyPassReverse /api http://127.0.0.1:8788/api

    # Le SDK Firebase Auth construit ces chemins à la racine de l'origine de
    # l'émulateur. Ils restent chiffrés publiquement et sont transmis en HTTP
    # uniquement sur la boucle locale du VPS.
    ProxyPass /identitytoolkit.googleapis.com http://127.0.0.1:9099/identitytoolkit.googleapis.com
    ProxyPassReverse /identitytoolkit.googleapis.com http://127.0.0.1:9099/identitytoolkit.googleapis.com
    ProxyPass /securetoken.googleapis.com http://127.0.0.1:9099/securetoken.googleapis.com
    ProxyPassReverse /securetoken.googleapis.com http://127.0.0.1:9099/securetoken.googleapis.com
    ProxyPass /www.googleapis.com/identitytoolkit http://127.0.0.1:9099/www.googleapis.com/identitytoolkit
    ProxyPassReverse /www.googleapis.com/identitytoolkit http://127.0.0.1:9099/www.googleapis.com/identitytoolkit

    ErrorLog ${APACHE_LOG_DIR}/goa-kombucha-error.log
    CustomLog ${APACHE_LOG_DIR}/goa-kombucha-access.log combined
</VirtualHost>
