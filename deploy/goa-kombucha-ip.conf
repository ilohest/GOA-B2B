<VirtualHost *:80>
    ServerName 82.112.255.95

    DocumentRoot /var/www/html/isaure/goa-kombucha/web
    <Directory /var/www/html/isaure/goa-kombucha/web>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8788/api
    ProxyPassReverse /api http://127.0.0.1:8788/api

    ErrorLog ${APACHE_LOG_DIR}/goa-kombucha-error.log
    CustomLog ${APACHE_LOG_DIR}/goa-kombucha-access.log combined
</VirtualHost>
